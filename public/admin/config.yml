# Sveltia CMS configuration (Decap-compatible).
# ── BEFORE USE: set `repo` to your GitHub "owner/repository".
backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO   # e.g. acme/acme-site
  branch: main

# Where uploaded images go.
media_folder: "public/uploads"
public_folder: "/uploads"

# Friendlier editorial workflow can be enabled later; keep simple for testing.
collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Team" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }
